name: Update Money OS prices
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: prices
  cancel-in-progress: true
jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch prices
        run: python3 scripts/fetch_prices.py
      - name: Commit if changed
        run: |
          git config user.name "prices-bot"
          git config user.email "matasbuika1@gmail.com"
          git add moneyos/prices.json
          git diff --cached --quiet || git commit -m "prices update [skip ci]"
          git pull --rebase origin main
          git push
